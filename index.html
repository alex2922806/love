<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- важно для мобильных -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body{
            margin:0;
            background:#ffe6f0;
            height:100vh;
            overflow:hidden;
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
            font-family:'Playfair Display',serif;
            color:#333;
        }

        /* button */
        button{
            padding:14px 28px;
            font-size:20px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            background:#ff3b6b;
            color:white;
            z-index:10;
        }

        /* polaroid */
        .card{
            position:absolute;
            width:220px;
            background:white;
            padding:10px 10px 40px 10px;
            border-radius:4px;
            box-shadow:0 20px 40px rgba(0,0,0,0.2);
        }

        .card img{
            width:100%;
            display:block;
        }

        .me{ left:40%; top:-350px; transform:rotate(-8deg);}
        .her{ left:60%; top:-350px; transform:rotate(8deg);}

        /* heart photo */
        .heartPhoto {
            position:absolute;
            top:40%;
            left:50%;
            transform:translate(-50%,-50%);
            width:320px;
            height:400px;
            opacity:0;
        }

        /* album */
        .album{
            position:relative;
            width:100%;
            height:100%;
            overflow:visible;
        }

        .album-viewport{
            width:100%;
            height:100%;
            border-radius:14px;
            overflow:hidden;
            background:#fff;
            box-shadow:0 18px 35px rgba(0,0,0,0.25);
        }

        .album-track{
            display:flex;
            width:100%;
            height:100%;
            transition:transform 0.45s ease;
        }

        .album-slide{
            min-width:100%;
            height:100%;
        }

        .album-slide img{
            width:100%;
            height:100%;
            object-fit:cover;
            object-position:center 20%;
            display:block;
        }

        .album-btn{
            position:absolute;
            top:50%;
            transform:translateY(-50%);
            width:72px;
            height:72px;
            border:none;
            border-radius:50%;
            background:transparent;
            color:#ff1a75;
            font-size:34px;
            line-height:1;
            cursor:pointer;
            z-index:2;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:0;
        }

        .album-btn::before{
            content:"";
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            width:54px;
            height:54px;
            border-radius:50%;
            background:rgba(255,255,255,0.9);
            border:2px solid rgba(255,255,255,0.95);
            box-shadow:0 6px 16px rgba(0,0,0,0.2);
            z-index:0;
        }

        .album-btn:hover::before{
            border-color:#ff1a75;
        }

        .album-btn span{
            position:relative;
            z-index:1;
            display:block;
        }

        .album-btn.prev{ left:-78px; }
        .album-btn.next{ right:-78px; }

        .album-dots{
            position:absolute;
            bottom:10px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            gap:8px;
            z-index:2;
        }

        .album-dot{
            width:8px;
            height:8px;
            border-radius:50%;
            background:rgba(255,255,255,0.6);
        }

        .album-dot.active{
            background:#ff1a75;
        }

        /* sexy text */
        .letter{
            position:absolute;
            bottom:10%;
            text-align:center;
            font-family:'Great Vibes',cursive;
            font-size:44px;
            opacity:0;
            color:#ff1a75;
            -webkit-text-stroke:0;
            text-shadow:0 0 10px rgba(255,0,100,0.4),0 0 20px rgba(255,0,100,0.2);
        }

        /* timer */
        .counter{
            position:absolute;
            top:30px;
            font-size:22px;
            padding:12px 22px;
            border-radius:10px;
            background:rgba(255,255,255,0.6);
            color:#ff1a75;
            -webkit-text-stroke:0;
            text-shadow:0 0 10px rgba(255,0,100,0.3),0 0 20px rgba(255,0,100,0.1);
        }

        /* particles */
        .particle{
            position:absolute;
            font-size:16px;
            animation:float 4s linear forwards;
        }
        @keyframes float{
            0%{opacity:1}
            100%{transform:translateY(-200px);opacity:0}
        }

        /* flowers */
        .flower{
            position:absolute;
            top:-50px;
            font-size:28px;
            animation:fall linear forwards;
        }
        @keyframes fall{
            to{transform:translateY(110vh) rotate(360deg);}
        }

        /* =================== */
        /* адаптив под телефон */
        /* =================== */
        @media (max-width: 768px) {
            .card{ width:150px; padding:8px 8px 30px 8px; }
            .me{ left:25%; top:-250px; transform:rotate(-5deg);}
            .her{ left:75%; top:-250px; transform:rotate(5deg);}
            .heartPhoto{ width:250px; height:300px; }
            .album-btn{ width:56px; height:56px; font-size:26px; }
            .album-btn::before{ width:42px; height:42px; }
            .album-btn.prev{ left:-60px; }
            .album-btn.next{ right:-60px; }
            .album-dots{ bottom:8px; }
            .letter{ font-size:28px; bottom:5%; }
            .counter{ font-size:18px; padding:8px 16px; top:20px; }
            .particle{ font-size:12px; }
            .flower{ font-size:20px; }
        }

        @media (max-width: 480px) {
            .card{ width:120px; padding:6px 6px 25px 6px; }
            .me{ left:20%; top:-220px; transform:rotate(-5deg);}
            .her{ left:80%; top:-220px; transform:rotate(5deg);}
            .heartPhoto{ width:200px; height:250px; }
            .album-btn{ width:48px; height:48px; font-size:22px; }
            .album-btn::before{ width:36px; height:36px; }
            .album-btn.prev{ left:-52px; }
            .album-btn.next{ right:-52px; }
            .letter{ font-size:22px; bottom:3%; }
            .counter{ font-size:16px; padding:6px 12px; top:15px; }
            .particle{ font-size:10px; }
            .flower{ font-size:16px; }
            button{ padding:12px 20px; font-size:18px; }
        }
    </style>
</head>
<body>

<button onclick="start()">Открыть ❤️</button>

<div class="card me" id="me">
    <img src="me.png">
</div>

<div class="card her" id="her">
    <img src="her.png">
</div>

<div class="heartPhoto" id="heartPhoto">
    <div class="album" id="album">
        <div class="album-viewport">
            <div class="album-track" id="albumTrack">
                <div class="album-slide"><img src="together1.png" alt=""></div>
                <div class="album-slide"><img src="together2.png" alt=""></div>
                <div class="album-slide"><img src="together3.png" alt=""></div>
                <div class="album-slide"><img src="together4.png" alt=""></div>
                <div class="album-slide"><img src="together5.png" alt=""></div>
            </div>
        </div>
        <button class="album-btn prev" id="albumPrev" aria-label="Назад"><span>‹</span></button>
        <button class="album-btn next" id="albumNext" aria-label="Вперёд"><span>›</span></button>
        <div class="album-dots" id="albumDots"></div>
    </div>
</div>

<div class="counter" id="counter"></div>

<div class="letter" id="letter">
    fashion fashion<br>
    handsome handsome<br>
    Love Love Love ❤️
</div>

<audio id="music">
    <source src="music.mp3">
</audio>

<script>
    const startDate = new Date("2026-02-07T00:00:00");

    function updateCounter(){
        let now = new Date();
        let diff = now - startDate;
        let days = Math.floor(diff / 86400000);
        let hours = Math.floor((diff % 86400000) / 3600000);
        let minutes = Math.floor((diff % 3600000) / 60000);
        let seconds = Math.floor((diff % 60000) / 1000);
        document.getElementById("counter").innerHTML =
            "⏱ Мы вместе: "+days+" дней "+hours+" часов "+minutes+" минут "+seconds+" сек ❤️";
    }
    setInterval(updateCounter,1000); updateCounter();

    function start(){
        document.querySelector("button").remove();
        document.getElementById("music").play();
        spawnFlowers();
        dropCards();
    }

    function dropCards(){
        let me=document.getElementById("me"), her=document.getElementById("her");
        let pos=-350;
        function frame(){
            pos+=1.8;
            me.style.top=pos+"px";
            her.style.top=pos+"px";
            if(pos < window.innerHeight/2-200){ requestAnimationFrame(frame); } else { merge(); }
        }
        frame();
    }

    function merge(){
        let me=document.getElementById("me"), her=document.getElementById("her");
        spawnHeart();
        me.style.display="none"; her.style.display="none";
        let heart=document.getElementById("heartPhoto");
        setTimeout(()=>{ heart.style.opacity=1 },300);
        setTimeout(()=>{ document.getElementById("letter").style.opacity=1 },1400);
    }

    function spawnHeart(){
        let cx=window.innerWidth/2, cy=window.innerHeight/2;
        for(let i=0;i<120;i++){
            let angle=Math.random()*Math.PI*2;
            let r=120*(1-Math.sin(angle));
            let x=cx+r*Math.cos(angle), y=cy+r*Math.sin(angle);
            let p=document.createElement("div");
            p.className="particle"; p.innerHTML="❤️";
            p.style.left=x+"px"; p.style.top=y+"px";
            document.body.appendChild(p);
            setTimeout(()=>p.remove(),4000);
        }
    }

    function spawnFlowers(){
        setInterval(()=>{
            let f=document.createElement("div");
            f.className="flower"; f.innerHTML="🌸";
            f.style.left=Math.random()*100+"vw";
            f.style.animationDuration=(6+Math.random()*4)+"s";
            document.body.appendChild(f);
            setTimeout(()=>f.remove(),10000);
        },250);
    }

    // album slider
    const albumTrack = document.getElementById("albumTrack");
    const albumSlides = Array.from(albumTrack.children);
    const albumDots = document.getElementById("albumDots");
    let albumIndex = 0;

    function renderDots(){
        albumDots.innerHTML="";
        albumSlides.forEach((_, i)=>{
            const dot=document.createElement("div");
            dot.className="album-dot"+(i===albumIndex?" active":"");
            dot.addEventListener("click", ()=>goToSlide(i));
            albumDots.appendChild(dot);
        });
    }

    function goToSlide(index){
        albumIndex = (index + albumSlides.length) % albumSlides.length;
        albumTrack.style.transform = `translateX(-${albumIndex * 100}%)`;
        renderDots();
    }

    document.getElementById("albumPrev").addEventListener("click", ()=>goToSlide(albumIndex-1));
    document.getElementById("albumNext").addEventListener("click", ()=>goToSlide(albumIndex+1));

    // swipe support
    let touchStartX = 0;
    let touchDeltaX = 0;
    const album = document.getElementById("album");
    album.addEventListener("touchstart", (e)=>{
        touchStartX = e.touches[0].clientX;
        touchDeltaX = 0;
    }, {passive:true});
    album.addEventListener("touchmove", (e)=>{
        touchDeltaX = e.touches[0].clientX - touchStartX;
    }, {passive:true});
    album.addEventListener("touchend", ()=>{
        if(Math.abs(touchDeltaX) > 40){
            goToSlide(touchDeltaX > 0 ? albumIndex-1 : albumIndex+1);
        }
    });

    renderDots();
</script>
</body>
</html>
