<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- важно для мобильных -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body{
            margin:0;
            background:#ffe6f0;
            height:100vh;
            overflow:hidden;
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
            font-family:'Playfair Display',serif;
            color:#333;
        }

        /* button */
        button{
            padding:14px 28px;
            font-size:20px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            background:#ff3b6b;
            color:white;
            z-index:10;
        }

        /* polaroid */
        .card{
            position:absolute;
            width:220px;
            background:white;
            padding:10px 10px 40px 10px;
            border-radius:4px;
            box-shadow:0 20px 40px rgba(0,0,0,0.2);
        }

        .card img{
            width:100%;
            display:block;
        }

        .me{ left:40%; top:-350px; transform:rotate(-8deg);}
        .her{ left:60%; top:-350px; transform:rotate(8deg);}

        /* heart photo */
        .heartPhoto {
            position:absolute;
            top:40%;
            left:50%;
            transform:translate(-50%,-50%);
            width:320px;
            height:400px;
            opacity:0;
        }

        .heartPhoto img{
            width:100%;
            height:100%;
            object-fit:cover;
            clip-path:none;
            object-position:center 20%;
        }

        /* sexy text */
        .letter{
            position:absolute;
            bottom:10%;
            text-align:center;
            font-family:'Great Vibes',cursive;
            font-size:44px;
            opacity:0;
            color:#ff1a75;
            -webkit-text-stroke:0;
            text-shadow:0 0 10px rgba(255,0,100,0.4),0 0 20px rgba(255,0,100,0.2);
        }

        /* timer */
        .counter{
            position:absolute;
            top:30px;
            font-size:22px;
            padding:12px 22px;
            border-radius:10px;
            background:rgba(255,255,255,0.6);
            color:#ff1a75;
            -webkit-text-stroke:0;
            text-shadow:0 0 10px rgba(255,0,100,0.3),0 0 20px rgba(255,0,100,0.1);
        }

        /* particles */
        .particle{
            position:absolute;
            font-size:16px;
            animation:float 4s linear forwards;
        }
        @keyframes float{
            0%{opacity:1}
            100%{transform:translateY(-200px);opacity:0}
        }

        /* flowers */
        .flower{
            position:absolute;
            top:-50px;
            font-size:28px;
            animation:fall linear forwards;
        }
        @keyframes fall{
            to{transform:translateY(110vh) rotate(360deg);}
        }

        /* =================== */
        /* адаптив под телефон */
        /* =================== */
        @media (max-width: 768px) {
            .card{ width:150px; padding:8px 8px 30px 8px; }
            .me{ left:25%; top:-250px; transform:rotate(-5deg);}
            .her{ left:75%; top:-250px; transform:rotate(5deg);}
            .heartPhoto{ width:250px; height:300px; }
            .letter{ font-size:28px; bottom:5%; }
            .counter{ font-size:18px; padding:8px 16px; top:20px; }
            .particle{ font-size:12px; }
            .flower{ font-size:20px; }
        }

        @media (max-width: 480px) {
            .card{ width:120px; padding:6px 6px 25px 6px; }
            .me{ left:20%; top:-220px; transform:rotate(-5deg);}
            .her{ left:80%; top:-220px; transform:rotate(5deg);}
            .heartPhoto{ width:200px; height:250px; }
            .letter{ font-size:22px; bottom:3%; }
            .counter{ font-size:16px; padding:6px 12px; top:15px; }
            .particle{ font-size:10px; }
            .flower{ font-size:16px; }
            button{ padding:12px 20px; font-size:18px; }
        }
    </style>
</head>
<body>

<button onclick="start()">Открыть ❤️</button>

<div class="card me" id="me">
    <img src="me.png">
</div>

<div class="card her" id="her">
    <img src="her.png">
</div>

<div class="heartPhoto" id="heartPhoto">
    <img src="together.png">
</div>

<div class="counter" id="counter"></div>

<div class="letter" id="letter">
    fashion fashion<br>
    handsome handsome<br>
    Love Love Love ❤️
</div>

<audio id="music">
    <source src="music.mp3">
</audio>

<script>
    const startDate = new Date("2026-02-07T00:00:00");

    function updateCounter(){
        let now = new Date();
        let diff = now - startDate;
        let days = Math.floor(diff / 86400000);
        let hours = Math.floor((diff % 86400000) / 3600000);
        let minutes = Math.floor((diff % 3600000) / 60000);
        let seconds = Math.floor((diff % 60000) / 1000);
        document.getElementById("counter").innerHTML =
            "⏱ Мы вместе: "+days+" дней "+hours+" часов "+minutes+" минут "+seconds+" сек ❤️";
    }
    setInterval(updateCounter,1000); updateCounter();

    function start(){
        document.querySelector("button").remove();
        document.getElementById("music").play();
        spawnFlowers();
        dropCards();
    }

    function dropCards(){
        let me=document.getElementById("me"), her=document.getElementById("her");
        let pos=-350;
        function frame(){
            pos+=1.8;
            me.style.top=pos+"px";
            her.style.top=pos+"px";
            if(pos < window.innerHeight/2-200){ requestAnimationFrame(frame); } else { merge(); }
        }
        frame();
    }

    function merge(){
        let me=document.getElementById("me"), her=document.getElementById("her");
        spawnHeart();
        me.style.display="none"; her.style.display="none";
        let heart=document.getElementById("heartPhoto");
        setTimeout(()=>{ heart.style.opacity=1 },300);
        setTimeout(()=>{ document.getElementById("letter").style.opacity=1 },1400);
    }

    function spawnHeart(){
        let cx=window.innerWidth/2, cy=window.innerHeight/2;
        for(let i=0;i<120;i++){
            let angle=Math.random()*Math.PI*2;
            let r=120*(1-Math.sin(angle));
            let x=cx+r*Math.cos(angle), y=cy+r*Math.sin(angle);
            let p=document.createElement("div");
            p.className="particle"; p.innerHTML="❤️";
            p.style.left=x+"px"; p.style.top=y+"px";
            document.body.appendChild(p);
            setTimeout(()=>p.remove(),4000);
        }
    }

    function spawnFlowers(){
        setInterval(()=>{
            let f=document.createElement("div");
            f.className="flower"; f.innerHTML="🌸";
            f.style.left=Math.random()*100+"vw";
            f.style.animationDuration=(6+Math.random()*4)+"s";
            document.body.appendChild(f);
            setTimeout(()=>f.remove(),10000);
        },250);
    }
</script>
</body>
</html>
